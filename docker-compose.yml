services:
  postgres:
    image: postgres:16-alpine
    container_name: ims-postgres
    environment:
      POSTGRES_DB: ims
      POSTGRES_USER: ims
      POSTGRES_PASSWORD: ims
    ports:
      - "5433:5432"
    volumes:
      - ims_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims -d ims"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ims_pgdata:
